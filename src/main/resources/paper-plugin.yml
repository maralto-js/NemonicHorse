name: NemonicHorse
version: '${project.version}'
main: com.nemonichorse.NemonicHorse
description: Sistema profissional de cavalaria para NemonicRP
api-version: '1.21'
authors:
  - NemonicRP
load: STARTUP

# Paper baixa esses JARs do Maven Central e adiciona ao classpath do plugin.
# O SQLite JDBC NÃO é bundled no plugin JAR — zero conflito com DLLs nativas.
libraries:
  - org.xerial:sqlite-jdbc:3.46.0.0

dependencies:
  server:
    PlaceholderAPI:
      required: false
      load: BEFORE
    MMOCore:
      required: false
      load: BEFORE
    ItemsAdder:
      required: false
      load: BEFORE

commands:
  horse:
    description: Comando principal de cavalaria
    permission: nemonicorp.horse.use
    aliases: [cavalo, hors]
    usage: /horse [info|skill|admin]

permissions:
  nemonicorp.horse.use:
    description: Usar o sistema de cavalaria
    default: true
  nemonicorp.horse.admin:
    description: Comandos administrativos de cavalaria
    default: op
  nemonicorp.horse.skill.dash:
    description: Usar habilidade Impeto
    default: true
  nemonicorp.horse.skill.jump:
    description: Usar habilidade Salto Heroico
    default: true
  nemonicorp.horse.skill.ironhide:
    description: Usar habilidade Casco de Ferro
    default: true
  nemonicorp.horse.skill.trample:
    description: Usar habilidade Esmagar
    default: true
